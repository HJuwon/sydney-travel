<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sydney Travel Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --teal: #1A6B5A;
  --teal-light: #E1F5EE;
  --teal-mid: #0F6E56;
  --coral: #D85A30;
  --coral-light: #FAECE7;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --blue: #378ADD;
  --blue-light: #E6F1FB;
  --gray: #5F5E5A;
  --gray-light: #F1EFE8;
  --cream: #FAFAF8;
  --white: #FFFFFF;
  --dark: #1C1C1A;
  --mid: #6B6B68;
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(0,0,0,0.16);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 3px 14px rgba(0,0,0,0.09);
}
[data-theme="dark"] {
  --teal: #3DD6A3; --teal-light: #0A2E24; --teal-mid: #3DD6A3;
  --coral: #F07550; --coral-light: #2E1810;
  --amber: #E8A030; --amber-light: #2A1E08;
  --blue: #5FA8F0; --blue-light: #0D1E34;
  --gray: #A0A09A; --gray-light: #2A2A28;
  --cream: #141412; --white: #1E1E1C; --dark: #F0F0EC; --mid: #9A9A96;
  --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.16);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.3); --shadow-md: 0 3px 14px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--dark); transition:background .2s,color .2s; }
.app { display:flex; height:100vh; overflow:hidden; }

/* ── sidebar ── */
.sidebar {
  width:64px; background:var(--white); border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center;
  padding:14px 0 16px; gap:2px; flex-shrink:0; z-index:100;
}
.sidebar-logo {
  width:38px; height:38px; background:var(--teal); border-radius:11px;
  display:flex; align-items:center; justify-content:center; margin-bottom:14px; cursor:pointer;
}
.sidebar-logo svg { width:19px; height:19px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.day-btn {
  width:46px; height:48px; border-radius:11px; border:1px solid transparent;
  background:transparent; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px; transition:all .15s;
  color:var(--mid); font-family:'DM Sans',sans-serif; position:relative;
}
.day-btn:hover { background:var(--gray-light); }
.day-btn.active { background:var(--teal); border-color:var(--teal); color:#fff; }
.day-btn .d-num { font-size:16px; font-weight:700; line-height:1; }
.day-btn .d-lbl { font-size:8.5px; font-weight:500; line-height:1; opacity:.72; letter-spacing:.3px; }
.day-btn.active .d-lbl { opacity:.85; }
.sidebar-sep { width:28px; height:1px; background:var(--border); margin:6px 0; }
.sb-icon {
  width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--mid); transition:.13s; border:none; background:transparent;
}
.sb-icon:hover { background:var(--gray-light); color:var(--dark); }
.sb-icon svg { width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
.info-day-btn {
  width:46px; height:48px; border-radius:11px; border:1px solid transparent;
  background:transparent; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px; transition:all .15s;
  color:var(--mid); font-family:'DM Sans',sans-serif;
}
.info-day-btn:hover { background:var(--gray-light); }
.info-day-btn.active { background:var(--amber); border-color:var(--amber); color:#fff; }
.info-day-btn .d-num { font-size:13px; font-weight:700; line-height:1; }
.info-day-btn .d-lbl { font-size:8.5px; font-weight:500; line-height:1; opacity:.72; letter-spacing:.3px; }

/* ── main ── */
.main-col { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
.topbar {
  height:50px; background:var(--white); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 18px; gap:10px; flex-shrink:0;
}
.topbar-title { font-family:'DM Serif Display',serif; font-size:17px; color:var(--dark); flex:1; letter-spacing:-.2px; }
.topbar-title em { color:var(--teal); font-style:italic; }
.tb-badge {
  font-size:11px; font-weight:500; padding:4px 10px; border-radius:100px;
  background:var(--teal-light); color:var(--teal-mid);
  display:flex; align-items:center; gap:5px; white-space:nowrap;
}
.tb-badge svg { width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.tb-time {
  font-size:11px; font-weight:600; padding:4px 10px; border-radius:100px;
  background:var(--blue-light); color:var(--blue); white-space:nowrap;
  font-variant-numeric:tabular-nums; display:flex; align-items:center; gap:5px;
}
.tb-weather {
  font-size:11px; font-weight:500; padding:4px 10px; border-radius:100px;
  background:var(--amber-light); color:var(--amber); white-space:nowrap;
  display:flex; align-items:center; gap:5px; cursor:pointer; position:relative;
}
.weather-popup {
  display:none; position:absolute; top:calc(100% + 8px); right:0;
  background:var(--white); border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; box-shadow:var(--shadow-md); z-index:9000; min-width:280px;
}
.weather-popup.show { display:block; }
.weather-days { display:flex; gap:8px; }
.weather-day-card {
  flex:1; background:var(--gray-light); border-radius:10px; padding:8px 6px;
  text-align:center; font-size:10px; color:var(--mid);
}
.weather-day-card .wd-icon { font-size:20px; margin:4px 0; }
.weather-day-card .wd-temp { font-size:12px; font-weight:600; color:var(--dark); }

/* ── sync status badge ── */
.sync-badge {
  font-size:10px; font-weight:600; padding:3px 9px; border-radius:100px;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
  transition:all .3s;
}
.sync-badge.ok   { background:var(--teal-light); color:var(--teal-mid); }
.sync-badge.saving { background:var(--amber-light); color:var(--amber); }
.sync-badge.error  { background:var(--coral-light); color:var(--coral); }
.sync-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

/* ── filter bars ── */
.filter-bar {
  height:42px; background:var(--white); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 18px; gap:6px;
  flex-shrink:0; overflow-x:auto; scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar { display:none; }
.f-btn {
  flex-shrink:0; height:28px; padding:0 12px; border-radius:100px;
  border:1px solid var(--border); background:transparent;
  font-family:'DM Sans',sans-serif; font-size:11.5px; font-weight:500;
  color:var(--mid); cursor:pointer; display:flex; align-items:center; gap:5px; transition:all .13s;
}
.f-btn:hover { border-color:var(--teal); color:var(--teal); }
.f-btn.active { background:var(--teal); border-color:var(--teal); color:#fff; }
.type-filter-bar {
  height:38px; background:var(--cream); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 18px; gap:5px;
  flex-shrink:0; overflow-x:auto; scrollbar-width:none;
}
.type-filter-bar.hidden { display:none; }
.type-chip {
  flex-shrink:0; height:24px; padding:0 10px; border-radius:100px;
  border:1px solid var(--border); background:var(--white);
  font-family:'DM Sans',sans-serif; font-size:10.5px; font-weight:500;
  color:var(--mid); cursor:pointer; transition:all .13s;
}
.type-chip:hover { border-color:var(--teal); color:var(--teal); }
.type-chip.active { background:var(--dark); border-color:var(--dark); color:var(--white); }

/* ── content ── */
.content-area { flex:1; display:flex; overflow:hidden; }
.timeline-panel {
  width:320px; flex-shrink:0; background:var(--cream);
  overflow-y:auto; overflow-x:hidden; padding:18px 14px 40px;
  border-right:1px solid var(--border);
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.timeline-panel::-webkit-scrollbar { width:4px; }
.timeline-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.day-heading { margin-bottom:16px; }
.day-heading h2 { font-family:'DM Serif Display',serif; font-size:19px; color:var(--dark); margin-bottom:1px; }
.day-heading p { font-size:11px; color:var(--mid); }
.day-section { display:none; }
.day-section.visible { display:block; }
.cat-section { display:none; }
.cat-section.visible { display:block; }

/* ── stop items ── */
.stop-item {
  position:relative; padding-left:30px; margin-bottom:0;
}
.stop-item::before {
  content:''; position:absolute; left:13px; top:34px;
  width:1px; bottom:0; background:var(--border);
}
.stop-item:last-child::before { display:none; }
.stop-item.type-hidden { display:none !important; }
.stop-dot {
  position:absolute; left:4px; top:10px; width:18px; height:18px;
  border-radius:50%; border:2px solid var(--white);
  box-shadow:0 0 0 1.5px var(--border-hover);
  display:flex; align-items:center; justify-content:center;
}
.stop-dot.type-food   { background:var(--coral); box-shadow:0 0 0 1.5px var(--coral); }
.stop-dot.type-coffee { background:var(--amber); box-shadow:0 0 0 1.5px var(--amber); }
.stop-dot.type-sight  { background:var(--blue);  box-shadow:0 0 0 1.5px var(--blue); }
.stop-dot.type-shop   { background:var(--teal);  box-shadow:0 0 0 1.5px var(--teal); }
.stop-dot.type-transit{ background:var(--gray);  box-shadow:0 0 0 1.5px var(--gray); }
.stop-dot.type-activity{ background:#9B59B6; box-shadow:0 0 0 1.5px #9B59B6; }
.stop-dot.type-hotel  { background:#16A085; box-shadow:0 0 0 1.5px #16A085; }
.stop-dot svg { width:9px; height:9px; stroke:#fff; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
.stop-card {
  background:var(--white); border:1px solid var(--border); border-radius:12px;
  padding:10px 12px; margin-bottom:6px; cursor:pointer; transition:all .14s; position:relative;
}
.stop-card:hover { border-color:var(--border-hover); box-shadow:var(--shadow-sm); transform:translateY(-1px); }
.stop-card.selected { border-color:var(--teal); box-shadow:0 0 0 2px rgba(26,107,90,0.15); }
.sc-actions {
  position:absolute; top:6px; right:6px;
  display:flex; gap:2px; align-items:center;
}
.fav-btn {
  width:26px; height:26px; border-radius:50%; border:none; background:transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:14px; line-height:1; transition:transform .15s; z-index:2;
}
.fav-btn:hover { transform:scale(1.2); }
.fav-btn.active { animation:favPop .25s ease; }
@keyframes favPop { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }
.edit-btn, .del-btn {
  width:22px; height:22px; border-radius:6px; border:none; background:transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:11px; color:var(--mid); transition:.13s; z-index:2;
}
.edit-btn:hover { background:var(--teal-light); color:var(--teal); }
.del-btn:hover  { background:var(--coral-light); color:var(--coral); }

.memo-area { margin-top:7px; border-top:1px dashed var(--border); padding-top:7px; display:none; }
.memo-area.show { display:block; }
.memo-input {
  width:100%; font-size:11px; color:var(--dark); background:var(--gray-light);
  border:none; border-radius:7px; padding:6px 8px; resize:none;
  font-family:'DM Sans',sans-serif; line-height:1.5; outline:none;
}
.memo-input:focus { outline:1.5px solid var(--teal); }
.memo-toggle {
  font-size:10px; color:var(--mid); cursor:pointer;
  display:inline-flex; align-items:center; gap:3px;
  margin-top:5px; background:none; border:none; font-family:'DM Sans',sans-serif;
}
.memo-toggle:hover { color:var(--teal); }
.memo-dot { width:6px; height:6px; border-radius:50%; background:var(--amber); display:none; flex-shrink:0; }
.memo-dot.show { display:inline-block; }

.sc-time { font-size:10px; font-weight:600; color:var(--mid); letter-spacing:.5px; text-transform:uppercase; margin-bottom:2px; }
.sc-name { font-size:13px; font-weight:600; color:var(--dark); margin-bottom:3px; line-height:1.35; padding-right:60px; }
.sc-desc { font-size:11.5px; color:var(--mid); line-height:1.5; }
.sc-tags { display:flex; gap:4px; margin-top:7px; flex-wrap:wrap; }
.sc-tag { font-size:10px; padding:2px 8px; border-radius:100px; font-weight:500; }
.sc-tag.food    { background:var(--coral-light); color:#8B3820; }
.sc-tag.coffee  { background:var(--amber-light); color:#7A4D0B; }
.sc-tag.sight   { background:var(--blue-light);  color:#1A4D8A; }
.sc-tag.shop    { background:var(--teal-light);  color:var(--teal-mid); }
.sc-tag.tip     { background:var(--gray-light);  color:var(--gray); }
.sc-tag.activity{ background:#F3E8FD; color:#6B3A9A; }

.transit-row {
  display:flex; align-items:center; gap:7px; padding:4px 0 8px;
}
.transit-pill {
  display:flex; align-items:center; gap:4px; background:var(--white);
  border:1px solid var(--border); border-radius:100px; padding:3px 9px;
  font-size:10.5px; font-weight:500; color:var(--mid);
}
.transit-pill svg { width:11px; height:11px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.transit-info { font-size:10px; color:var(--mid); opacity:.8; }

/* ── food grid ── */
.food-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.food-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:12px; overflow:hidden; cursor:default; transition:.14s; position:relative;
}
.food-card:hover { box-shadow:var(--shadow-sm); transform:translateY(-1px); }
.food-card.selected { outline:2px solid var(--coral); outline-offset:-1px; }
.food-emoji { height:60px; display:flex; align-items:center; justify-content:center; font-size:26px; }
.food-body { padding:8px 10px 10px; }
.food-name { font-size:12px; font-weight:600; margin-bottom:2px; padding-right:24px; }
.food-desc { font-size:10.5px; color:var(--mid); line-height:1.4; }
.food-price { font-size:10px; color:var(--coral); font-weight:600; margin-top:4px; }

/* ── tips / sights ── */
.tips-list { display:flex; flex-direction:column; gap:8px; }
.tip-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:11px 13px; display:flex; gap:10px; align-items:flex-start; }
.tip-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.tip-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.tip-text { font-size:11px; color:var(--mid); line-height:1.5; }
.sight-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:11px 13px; display:flex; gap:10px; align-items:flex-start; margin-bottom:8px; }
.sight-icon { font-size:20px; flex-shrink:0; }
.sight-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.sight-text { font-size:11px; color:var(--mid); line-height:1.5; }

/* ── favorites empty ── */
.fav-empty { text-align:center; padding:40px 20px; color:var(--mid); font-size:12px; line-height:1.8; }
.fav-empty .fe-icon { font-size:36px; margin-bottom:10px; }

/* ── expenses tab ── */
.expense-summary {
  display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;
}
.exp-sum-card {
  background:var(--white); border:1px solid var(--border); border-radius:12px;
  padding:12px 14px;
}
.exp-sum-label { font-size:10px; color:var(--mid); margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }
.exp-sum-value { font-family:'DM Serif Display',serif; font-size:18px; color:var(--dark); }
.exp-sum-sub { font-size:10px; color:var(--mid); margin-top:2px; }

.exp-add-btn {
  width:100%; height:38px; background:var(--teal); border:none; border-radius:10px;
  color:#fff; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  margin-bottom:12px; transition:.13s;
}
.exp-add-btn:hover { background:var(--teal-mid); }
.exp-add-btn svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

.expense-list { display:flex; flex-direction:column; gap:6px; }
.expense-item {
  background:var(--white); border:1px solid var(--border); border-radius:11px;
  padding:10px 12px; display:flex; align-items:center; gap:10px; position:relative;
}
.exp-cat-badge {
  width:32px; height:32px; border-radius:9px; background:var(--gray-light);
  display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;
}
.exp-info { flex:1; min-width:0; }
.exp-item-name { font-size:12px; font-weight:600; color:var(--dark); }
.exp-item-meta { font-size:10px; color:var(--mid); margin-top:1px; }
.exp-amount { font-size:13px; font-weight:700; color:var(--teal-mid); flex-shrink:0; }
.exp-del-btn {
  width:22px; height:22px; border-radius:6px; border:none; background:transparent;
  cursor:pointer; color:var(--mid); font-size:13px; line-height:1;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.exp-del-btn:hover { background:var(--coral-light); color:var(--coral); }

.exp-by-day {
  font-size:10px; font-weight:600; color:var(--mid); text-transform:uppercase;
  letter-spacing:.4px; margin:10px 0 5px; padding-left:2px;
}

/* ── modals ── */
.modal-backdrop {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
  z-index:8500; align-items:center; justify-content:center; padding:20px;
}
.modal-backdrop.show { display:flex; }
.modal {
  background:var(--white); border-radius:18px; width:min(440px,100%);
  box-shadow:0 20px 60px rgba(0,0,0,0.25); overflow:hidden;
  max-height:90vh; display:flex; flex-direction:column;
}
.modal-header {
  padding:16px 18px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.modal-title { font-family:'DM Serif Display',serif; font-size:17px; color:var(--dark); flex:1; }
.modal-close {
  width:28px; height:28px; border-radius:8px; border:none; background:var(--gray-light);
  cursor:pointer; font-size:14px; color:var(--mid); display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { background:var(--border-hover); }
.modal-body { padding:16px 18px; overflow-y:auto; flex:1; }
.modal-footer { padding:12px 18px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
.form-group { margin-bottom:12px; }
.form-label { font-size:11px; font-weight:600; color:var(--mid); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; display:block; }
.form-input, .form-select, .form-textarea {
  width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:9px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--dark);
  background:var(--white); outline:none; transition:.13s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--teal); }
.form-textarea { resize:vertical; min-height:70px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-primary {
  flex:1; height:38px; background:var(--teal); color:#fff; border:none; border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:.13s;
}
.btn-primary:hover { background:var(--teal-mid); }
.btn-secondary {
  height:38px; padding:0 18px; background:var(--gray-light); color:var(--mid);
  border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer;
}
.btn-secondary:hover { background:var(--border-hover); }
.btn-danger {
  height:38px; padding:0 18px; background:var(--coral-light); color:var(--coral);
  border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
}

/* ═══════════════════════════════════════════════
   CSV READ (읽기 전용 시트들 - 기존 방식 유지)
═══════════════════════════════════════════════ */
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row=[], cur='', inQ=false, i=0;
  const len = text.length;
  while (i < len) {
    const c = text[i];
    if (inQ) {
      if (c==='"') { if (text[i+1]==='"') { cur+='"'; i+=2; continue; } inQ=false; i++; continue; }
      cur+=c; i++; continue;
    } else {
      if (c==='"') { inQ=true; i++; continue; }
      if (c===',') { row.push(cur); cur=''; i++; continue; }
      if (c==='\r') {
        if (text[i+1]==='\n') i++;
        row.push(cur); cur=''; rows.push(row); row=[]; i++; continue;
      }
      if (c==='\n') { row.push(cur); cur=''; rows.push(row); row=[]; i++; continue; }
      cur+=c; i++; continue;
    }
  }
  if (cur!==''||row.length) { row.push(cur); rows.push(row); }
  const filtered = rows.filter(r => !(r.length===1 && r[0].trim()===''));
  if (filtered.length < 2) return [];
  const headers = filtered[0].map(h => h.trim());
  return filtered.slice(1).map(r => {
    const obj={};
    headers.forEach((h,i) => obj[h]=(r[i]||'').trim());
    return obj;
  });
}

async function fetchSheetCSV(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`시트 "${name}" 로드 실패`);
  const buf  = await res.arrayBuffer();
  return parseCSV(new TextDecoder('utf-8').decode(buf));
}

function scheduleCardId(r){ return `sch_${r.day}_${(r.name||'').replace(/\s+/g,'_')}`; }
function foodCardId(r){ return `food_${r.day}_${(r.name||'').replace(/\s+/g,'_')}`; }

function favBtnHtml(id) {
  const active = favState[id] ? ' active':'';
  const emoji  = favState[id] ? '❤️':'🤍';
  return `<button class="fav-btn${active}" onclick="toggleFav('${id}',event)" title="찜하기">${emoji}</button>`;
}
function memoHtml(id) {
  const val = memoState[id]||'';
  const has = val.trim().length>0;
  return `
    <button class="memo-toggle" onclick="toggleMemoArea('${id}',event)">
      <span class="memo-dot${has?' show':''}"></span>
      ${has?'📝 메모 보기':'+ 메모 추가'}
    </button>
    <div class="memo-area${has?' show':''}" id="memo-area-${id}">
      <textarea class="memo-input" rows="2" placeholder="이 장소에 대한 메모를 남기세요..."
        oninput="saveMemoInput('${id}',this.value)">${val}</textarea>
    </div>`;
}
function toggleMemoArea(id,e){ e&&e.stopPropagation(); document.getElementById(`memo-area-${id}`)?.classList.toggle('show'); }

/* ── schedule render ── */
function getDays(){ return [...new Set(DATA.schedule.map(r=>Number(r.day)))].sort((a,b)=>a-b); }

function renderSchedule(day) {
  const rows = DATA.schedule.filter(r=>Number(r.day)===day);
  if (!rows.length) return '';
  const dateStr  = rows[0].date||'';
  const dayTitle = rows.find(r=>r.title1?.trim())?.title1?.trim()||`Day ${day}`;
  let html = `<div class="day-section visible" id="day-${day}" data-day="${day}">`;
  html += `<div class="cat-section visible" data-cat="schedule">`;
  html += `<div class="day-heading"><h2>Day ${day} · ${dayTitle}</h2><p>${dateStr}</p></div>`;
  rows.forEach(row => {
    const type = (row.type||'sight').trim();
    const icon = typeIcons[type]||typeIcons.sight;
    const tags = (row.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    const tagHtml = tags.map(t=>`<span class="sc-tag ${tagClass(t)}">${t}</span>`).join('');
    const hasCoords = row.lat&&row.lng;
    const lat=parseFloat(row.lat), lng=parseFloat(row.lng);
    const addr=row.addr||'', name=row.name||'';
    const id=scheduleCardId(row);
    const rowId = row.id||id;
    const pinCall = hasCoords ? `onclick="pinMap('${name.replace(/'/g,"\\'")}',{lat:${lat},lng:${lng}},'${addr.replace(/'/g,"\\'")}',this)"` : '';
    html += `<div class="stop-item" data-type="${type}">
      <div class="stop-dot type-${type}">${icon}</div>
      <div class="stop-card" data-card-id="${id}" ${pinCall}>
        <div class="sc-actions">
          ${favBtnHtml(id)}
          <button class="edit-btn" onclick="openSchModal(${JSON.stringify({...row, _cardId:id}).replace(/"/g,'&quot;')},event)" title="수정">✏️</button>
          <button class="del-btn" onclick="confirmDeleteSchedule('${rowId}','${id}',event)" title="삭제">🗑</button>
        </div>
        <div class="sc-time">${row.time||''}</div>
        <div class="sc-name">${name}</div>
        <div class="sc-desc">${row.description||''}</div>
        ${tagHtml?`<div class="sc-tags">${tagHtml}</div>`:''}
        ${memoHtml(id)}
      </div>
      ${row.transit_next?`<div class="transit-row">
        <div class="transit-pill">${typeIcons.transit} ${row.transit_next}</div>
        <span class="transit-info">${row.transit_info||''}</span>
      </div>`:''}
    </div>`;
  });
  html += `</div>`;
  html += renderFoodSection(day);
  html += renderSightSection(day);
  html += renderTipsSection(day);
  html += `</div>`;
  return html;
}

function renderFoodSection(day) {
  const rows = DATA.food.filter(r=>Number(r.day)===day);
  if (!rows.length) return '';
  let html = `<div class="cat-section" data-cat="food">`;
  html += `<div class="day-heading"><h2>Day ${day} · 추천 맛집</h2></div>`;
  html += `<div class="food-grid">`;
  rows.forEach(r=>{
    const hasCoords=r.lat&&r.lng;
    const lat=parseFloat(r.lat),lng=parseFloat(r.lng);
    const addr=r.addr||'',name=r.name||'';
    const id=foodCardId(r);
    const pinCall=hasCoords?`onclick="pinMap('${name.replace(/'/g,"\\'")}',{lat:${lat},lng:${lng}},'${addr.replace(/'/g,"\\'")}',this)"`:'';
    html+=`<div class="food-card" data-card-id="${id}" ${pinCall} style="${hasCoords?'cursor:pointer':''}">
      ${favBtnHtml(id)}
      <div class="food-emoji" style="background:#${r.bg_color||'F5F5F5'}">${r.emoji||'🍽️'}</div>
      <div class="food-body">
        <div class="food-name">${name}${hasCoords?'<span style="font-size:9px;color:#D85A30;margin-left:3px">📍</span>':''}</div>
        <div class="food-desc">${r.description||''}</div>
        <div class="food-price">${r.price_level||''}</div>
        ${memoHtml(id)}
      </div>
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

function renderSightSection(day) {
  const rows=DATA.sights.filter(r=>Number(r.day)===day);
  if(!rows.length) return '';
  let html=`<div class="cat-section" data-cat="sights"><div class="day-heading"><h2>Day ${day} · 주요 관광지</h2></div>`;
  rows.forEach(r=>{ html+=`<div class="sight-card"><div class="sight-icon">${r.icon||'📍'}</div><div><div class="sight-title">${r.title}</div><div class="sight-text">${r.description||''}</div></div></div>`; });
  return html+'</div>';
}
function renderTipsSection(day) {
  const rows=DATA.tips.filter(r=>Number(r.day)===day);
  if(!rows.length) return '';
  let html=`<div class="cat-section" data-cat="tips"><div class="day-heading"><h2>Day ${day} · 여행 팁</h2></div><div class="tips-list">`;
  rows.forEach(r=>{ html+=`<div class="tip-card"><div class="tip-icon">${r.icon||'💡'}</div><div><div class="tip-title">${r.title}</div><div class="tip-text">${r.content||''}</div></div></div>`; });
  return html+'</div></div>';
}

/* ── favorites view ── */
function renderFavoritesView() {
  const favIds = Object.keys(favState).filter(k=>favState[k]);
  if (!favIds.length) return `<div class="fav-empty"><div class="fe-icon">🤍</div><div style="font-weight:600;margin-bottom:4px">찜한 장소가 없어요</div><div style="font-size:11px">카드의 🤍 버튼을 눌러 찜해보세요</div></div>`;

    html+=`<div style="font-size:11px;font-weight:600;color:var(--mid);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">일정</div>`;
    sf.forEach(row=>{
      const id=scheduleCardId(row);
      const hasCoords=row.lat&&row.lng;
      const pinCall=hasCoords?`onclick="pinMap('${(row.name||'').replace(/'/g,"\\'")}',{lat:${parseFloat(row.lat)},lng:${parseFloat(row.lng)}},'${(row.addr||'').replace(/'/g,"\\'")}',this)"`:'';
      html+=`<div class="stop-item" style="padding-left:14px"><div class="stop-card" data-card-id="${id}" ${pinCall}>${favBtnHtml(id)}<div class="sc-time">Day ${row.day} · ${row.time||''}</div><div class="sc-name">${row.name||''}</div><div class="sc-desc">${row.description||''}</div>${memoHtml(id)}</div></div>`;
    });
  }
  const ff=DATA.food.filter(r=>favState[foodCardId(r)]);
  if(ff.length){
    html+=`<div style="font-size:11px;font-weight:600;color:var(--mid);margin:12px 0 8px;text-transform:uppercase;letter-spacing:.4px">맛집</div><div class="food-grid">`;
    ff.forEach(r=>{
      const id=foodCardId(r);
      const hasCoords=r.lat&&r.lng;
      const pinCall=hasCoords?`onclick="pinMap('${(r.name||'').replace(/'/g,"\\'")}',{lat:${parseFloat(r.lat)},lng:${parseFloat(r.lng)}},'${(r.addr||'').replace(/'/g,"\\'")}',this)"`:'';
      html+=`<div class="food-card" data-card-id="${id}" ${pinCall} style="cursor:pointer">${favBtnHtml(id)}<div class="food-emoji" style="background:#${r.bg_color||'F5F5F5'}">${r.emoji||'🍽️'}</div><div class="food-body"><div class="food-name">Day ${r.day} · ${r.name||''}</div><div class="food-desc">${r.description||''}</div><div class="food-price">${r.price_level||''}</div>${memoHtml(id)}</div></div>`;
    });
    html+='</div>';
  }
  return html;
}

/* ── expenses view ── */
function renderExpensesView() {
  const exps = DATA.expenses;
  const audTotal = exps.filter(r=>r.currency==='AUD').reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const krwTotal = exps.filter(r=>r.currency==='KRW').reduce((s,r)=>s+parseFloat(r.amount||0),0);
  let html = `<div class="cat-section visible" data-cat="expenses">`;
  html += `<div class="day-heading"><h2>💰 여행 경비</h2></div>`;
  html += `<div class="expense-summary">
    <div class="exp-sum-card">
      <div class="exp-sum-label">AUD 합계</div>
      <div class="exp-sum-value">A$ ${audTotal.toFixed(2)}</div>
      ${liveRate?`<div class="exp-sum-sub">≈ ₩${Math.round(audTotal*liveRate).toLocaleString()}</div>`:''}
    </div>
    <div class="exp-sum-card">
      <div class="exp-sum-label">KRW 합계</div>
      <div class="exp-sum-value">₩${krwTotal.toLocaleString()}</div>
      <div class="exp-sum-sub">${exps.length}건</div>
    </div>
  </div>`;
  html += `<button class="exp-add-btn" onclick="openExpModal()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    경비 추가하기
  </button>`;
  if (!exps.length) {
    html += `<div class="fav-empty"><div class="fe-icon">💸</div><div style="font-weight:600">아직 경비 내역이 없어요</div></div>`;
  } else {
    // 날짜별 그룹
    const byDay = {};
    exps.forEach(r => {
      const k = r.day || r.date || '기타';
      if (!byDay[k]) byDay[k] = [];
      byDay[k].push(r);
    });
    Object.keys(byDay).sort().forEach(dk => {
      const dayTotal = byDay[dk].filter(r=>r.currency==='AUD').reduce((s,r)=>s+parseFloat(r.amount||0),0);
      html += `<div class="exp-by-day">Day ${dk} · A$ ${dayTotal.toFixed(2)}</div>`;
      html += `<div class="expense-list">`;
      byDay[dk].forEach(r => {
        const id = r.id||'';
        html += `<div class="expense-item">
          <div class="exp-cat-badge">${r.category||'💊'}</div>
          <div class="exp-info">
            <div class="exp-item-name">${r.item||'기타'}</div>
            <div class="exp-item-meta">${r.paid_by||''} ${r.note?'· '+r.note:''}</div>
          </div>
          <div class="exp-amount">${r.currency||'AUD'} ${parseFloat(r.amount||0).toFixed(2)}</div>
          <button class="exp-del-btn" onclick="deleteExpense('${id}',event)" title="삭제">🗑</button>
        </div>`;
      });
      html += `</div>`;
    });
  }
  html += `</div>`;
  return html;
}

/* ── day buttons ── */
function renderDayButtons() {
  const days=getDays();
  const labels={0:'출발',1:'하버',2:'본다이',3:'맨리',4:'블루산',5:'왓슨',6:'달링',7:'마지막',8:'귀국'};
  document.getElementById('day-buttons-container').innerHTML = days.map(d=>`<button class="day-btn" onclick="selectDay(${d},this)" title="Day ${d}"><span class="d-num">${d}</span><span class="d-lbl">${labels[d]||`D${d}`}</span></button>`).join('');
}

function renderAll() {

}

let schModalRow = null;

function openSchModal(rowOrNull, e) {
  e && e.stopPropagation();
  schModalRow = rowOrNull;
  const modal = document.getElementById('sch-modal');
  const isEdit = !!rowOrNull;
  document.getElementById('sch-modal-title').textContent = isEdit ? '일정 수정' : '일정 추가';
  document.getElementById('sch-delete-btn').style.display = isEdit ? '' : 'none';
  if (isEdit) {
    document.getElementById('sch-edit-id').value  = rowOrNull.id || rowOrNull._cardId || '';
    document.getElementById('sch-day').value       = rowOrNull.day||'';
    document.getElementById('sch-time').value      = rowOrNull.time||'';
    document.getElementById('sch-name').value      = rowOrNull.name||'';
    document.getElementById('sch-desc').value      = rowOrNull.description||'';
    document.getElementById('sch-type').value      = rowOrNull.type||'sight';
    document.getElementById('sch-tags').value      = rowOrNull.tags||'';
    document.getElementById('sch-lat').value       = rowOrNull.lat||'';
    document.getElementById('sch-lng').value       = rowOrNull.lng||'';
    document.getElementById('sch-addr').value      = rowOrNull.addr||'';
    document.getElementById('sch-transit').value   = rowOrNull.transit_next||'';
    document.getElementById('sch-date').value      = rowOrNull.date||'';
  } else {
    ['sch-edit-id','sch-day','sch-time','sch-name','sch-desc','sch-tags','sch-lat','sch-lng','sch-addr','sch-transit','sch-date'].forEach(id=>{ document.getElementById(id).value=''; });
    document.getElementById('sch-type').value='sight';
  }
  modal.classList.add('show');
}
function closeSchModal(){ document.getElementById('sch-modal').classList.remove('show'); }

async function saveScheduleItem() {
  const name = document.getElementById('sch-name').value.trim();
  const day  = document.getElementById('sch-day').value.trim();
  if (!name || !day) { showToast('⚠️ 날짜와 장소명을 입력해주세요'); return; }
  const editId = document.getElementById('sch-edit-id').value.trim();
  const data = {
    id: editId || `sch_${day}_${name.replace(/\s+/g,'_')}_${Date.now()}`,
    day, time:document.getElementById('sch-time').value.trim(),
    name, description:document.getElementById('sch-desc').value.trim(),
    type:document.getElementById('sch-type').value,
    tags:document.getElementById('sch-tags').value.trim(),
    lat:document.getElementById('sch-lat').value.trim(),
    lng:document.getElementById('sch-lng').value.trim(),
    addr:document.getElementById('sch-addr').value.trim(),
    transit_next:document.getElementById('sch-transit').value.trim(),
    date:document.getElementById('sch-date').value.trim(),
  };
  closeSchModal();
  const result = await apiPost({ action:'update_schedule', id: data.id, data: {...data, _append:!editId} });
  if (result.ok) {
    // 로컬 DATA 갱신
    if (editId) {
      const idx = DATA.schedule.findIndex(r => r.id === editId || scheduleCardId(r) === editId);
      if (idx>=0) DATA.schedule[idx] = data; else DATA.schedule.push(data);
    } else {
      DATA.schedule.push(data);
    }
    DATA.schedule.sort((a,b)=>Number(a.day)-Number(b.day)||(a.time||'').localeCompare(b.time||''));
    renderAll();
    updateView();
  }
}

function deleteScheduleItem() {
  const editId = document.getElementById('sch-edit-id').value.trim();
  if (!editId) { closeSchModal(); return; }
  confirmDeleteSchedule(editId, editId);
  closeSchModal();
}

async function confirmDeleteSchedule(rowId, cardId, e) {
  e && e.stopPropagation();
  if (!confirm('이 일정을 삭제할까요?')) return;
  const result = await apiPost({ action:'delete', sheet:'schedule', id:rowId });
  if (result.ok) {
    DATA.schedule = DATA.schedule.filter(r => r.id !== rowId && scheduleCardId(r) !== cardId);
    renderAll();
    updateView();
  }
}

function openExpModal(){ document.getElementById('exp-modal').classList.add('show'); }
function closeExpModal(){ document.getElementById('exp-modal').classList.remove('show'); }

async function saveExpense() {
  const item   = document.getElementById('exp-item').value.trim();
  const amount = document.getElementById('exp-amount').value.trim();
  if (!item || !amount) { showToast('⚠️ 항목명과 금액을 입력해주세요'); return; }
  const id = 'exp_' + Date.now();
  const data = {
    id,
    day:      document.getElementById('exp-day').value.trim(),
    date:     document.getElementById('exp-date').value.trim(),
    category: document.getElementById('exp-cat').value,
    item,
    amount:   parseFloat(amount).toFixed(2),
    currency: document.getElementById('exp-currency').value,
    paid_by:  document.getElementById('exp-paidby').value.trim()||'나',
    note:     document.getElementById('exp-note').value.trim(),
    created_at: new Date().toISOString()
  };
  closeExpModal();
  const result = await apiPost({ action:'append', sheet:'expenses', data });
  if (result.ok) {
    DATA.expenses.push(data);
    if (currentCat === 'expenses') {
      document.getElementById('timeline-content').innerHTML = renderExpensesView();
    }
  }
}

async function deleteExpense(id, e) {
  e && e.stopPropagation();
  if (!id || !confirm('이 경비를 삭제할까요?')) return;
  const result = await apiPost({ action:'delete', sheet:'expenses', id });
  if (result.ok) {
    DATA.expenses = DATA.expenses.filter(r => r.id !== id);
    document.getElementById('timeline-content').innerHTML = renderExpensesView();
  }
}

/* ═══════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════ */
function openSearch(){ document.getElementById('search-backdrop').classList.add('show'); setTimeout(()=>document.getElementById('search-input').focus(),50); }
function closeSearch(e){ if(e&&e.target!==document.getElementById('search-backdrop'))return; document.getElementById('search-backdrop').classList.remove('show'); document.getElementById('search-input').value=''; document.getElementById('search-results').innerHTML='<div class="search-empty">검색어를 입력하세요</div>'; }
document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();} if(e.key==='Escape')document.getElementById('search-backdrop').classList.remove('show'); });
function hl(t,q){ if(!q)return t; return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark class="sri-mark">$1</mark>'); }
function doSearch(q) {
  q=q.trim(); const el=document.getElementById('search-results');
  if(!q){el.innerHTML='<div class="search-empty">검색어를 입력하세요</div>';return;}
  const res={schedule:[],food:[],tips:[]};
  DATA.schedule.forEach(r=>{ if([r.name,r.description,r.tags].join(' ').toLowerCase().includes(q.toLowerCase())) res.schedule.push(r); });
  DATA.food.forEach(r=>{ if([r.name,r.description].join(' ').toLowerCase().includes(q.toLowerCase())) res.food.push(r); });
  DATA.tips.forEach(r=>{ if([r.title,r.content].join(' ').toLowerCase().includes(q.toLowerCase())) res.tips.push(r); });
  const total=res.schedule.length+res.food.length+res.tips.length;
  if(!total){el.innerHTML=`<div class="search-empty">검색 결과 없음 — <strong>${q}</strong></div>`;return;}
  let html='';
  if(res.schedule.length){
    html+=`<div class="search-section-header">📅 일정 (${res.schedule.length})</div>`;
    res.schedule.forEach(r=>{
      const type=r.type||'sight'; const colors={food:'#FAECE7',coffee:'#FAEEDA',sight:'#E6F1FB',shop:'#E1F5EE',activity:'#F3E8FD',hotel:'#E1F5EE',transit:'#F1EFE8'};
      html+=`<div class="search-result-item" onclick="jumpToCard('${scheduleCardId(r)}','schedule')"><div class="sri-icon" style="background:${colors[type]||'#F1EFE8'}">${{food:'🍽',coffee:'☕',sight:'📍',shop:'🛍',activity:'🎯',hotel:'🏨',transit:'🚌'}[type]||'📍'}</div><div style="flex:1;min-width:0"><div class="sri-day">Day ${r.day} · ${r.time||''}</div><div class="sri-name">${hl(r.name||'',q)}</div><div class="sri-desc">${hl((r.description||'').slice(0,60),q)}</div></div></div>`;
    });
  }
  if(res.food.length){
    html+=`<div class="search-section-header">🍽️ 맛집 (${res.food.length})</div>`;
    res.food.forEach(r=>{ html+=`<div class="search-result-item" onclick="jumpToCard('${foodCardId(r)}','food')"><div class="sri-icon" style="background:#FAECE7">${r.emoji||'🍽️'}</div><div style="flex:1;min-width:0"><div class="sri-day">Day ${r.day}</div><div class="sri-name">${hl(r.name||'',q)}</div><div class="sri-desc">${hl((r.description||'').slice(0,60),q)}</div></div></div>`; });
  }
  if(res.tips.length){
    html+=`<div class="search-section-header">💡 팁 (${res.tips.length})</div>`;
    res.tips.forEach(r=>{ html+=`<div class="search-result-item" onclick="jumpToTip(${r.day})"><div class="sri-icon" style="background:#FAEEDA">${r.icon||'💡'}</div><div style="flex:1;min-width:0"><div class="sri-day">Day ${r.day}</div><div class="sri-name">${hl(r.title||'',q)}</div><div class="sri-desc">${hl((r.content||'').slice(0,60),q)}</div></div></div>`; });
  }
  el.innerHTML=html;
}
function jumpToCard(id,cat){
  document.getElementById('search-backdrop').classList.remove('show');
  const catBtn=[...document.querySelectorAll('#main-filter-bar .f-btn')].find(b=>cat==='schedule'?b.textContent.includes('전체'):b.textContent.includes('맛'));
  if(catBtn) selectCat(cat,catBtn);
  const row=cat==='food'?DATA.food.find(r=>foodCardId(r)===id):DATA.schedule.find(r=>scheduleCardId(r)===id);
  if(row){ const db=[...document.querySelectorAll('.day-btn')].find(b=>b.querySelector('.d-num')?.textContent==row.day); if(db)selectDay(Number(row.day),db); }
  setTimeout(()=>{ const el=document.querySelector(`[data-card-id="${id}"]`); if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('selected');setTimeout(()=>el.classList.remove('selected'),1800);} },300);
}
function jumpToTip(day){ document.getElementById('search-backdrop').classList.remove('show'); const b=[...document.querySelectorAll('#main-filter-bar .f-btn')].find(b=>b.textContent.includes('팁')); if(b)selectCat('tips',b); const db=[...document.querySelectorAll('.day-btn')].find(b=>b.querySelector('.d-num')?.textContent==day); if(db)selectDay(Number(day),db); }

/* ═══════════════════════════════════════════════
   INFO TAB
═══════════════════════════════════════════════ */
let currentInfoCat='flight', infoTabActive=false;
function getInfoBy(cat){ return DATA.info.filter(r=>r.category===cat); }

function renderInfoContent(cat) {
  const rows=getInfoBy(cat);
  let html='';
  if(cat==='flight')         html=renderInfoCard('✈️','항공편 정보','teal',rows);
  else if(cat==='exchange')  html=renderExchangeCard(rows);
  else if(cat==='hotel')     html=renderInfoCard('🏨','숙소 정보','blue',rows);
  else if(cat==='transport') html=renderInfoCard('🚌','교통 정보','amber',rows);
  else if(cat==='budget')    html=renderBudgetCard(rows);
  else if(cat==='checklist') html=renderChecklistCard(rows);
  if(!rows.length && cat!=='checklist' && cat!=='budget') html=`<div style="text-align:center;padding:40px 20px;color:var(--mid)"><div style="font-size:32px;margin-bottom:10px">📭</div><div style="font-size:13px">데이터 없음</div></div>`;
  document.getElementById('info-content').innerHTML=html;
  if(cat==='budget') setTimeout(()=>{ document.querySelectorAll('.budget-item-bar[data-pct]').forEach(b=>b.style.width=b.getAttribute('data-pct')+'%'); },50);
}
function renderInfoCard(icon,title,cc,rows){
  if(!rows.length)return'';
  let html=`<div class="info-section"><div class="info-card"><div class="info-card-header ${cc}"><span class="ich-badge">${icon}</span>${title}</div><div class="info-rows">`;
  rows.forEach(r=>{const v=r.value||'';const isURL=v.startsWith('http');html+=`<div class="info-row"><div class="info-row-icon">${r.icon||''}</div><div class="info-row-text"><div class="info-row-label">${r.label||''}</div><div class="info-row-value">${isURL?`<a href="${v}" target="_blank" class="info-link">🔗 바로가기</a>`:v}</div></div></div>`;});
  return html+'</div></div></div>';
}
function renderExchangeCard(rows){
  const rateRow=rows.find(r=>r.label?.includes('환율'))||rows[0];
  const displayRate=liveRate?Math.round(liveRate).toLocaleString()+' 원':(rateRow?.value||'-');
  let html=`<div class="info-section"><div class="info-card"><div class="info-card-header amber"><span class="ich-badge">💱</span>환율 정보${liveRate?`<span class="exchange-live-badge">실시간</span>`:''}</div><div class="exchange-big"><div class="exchange-rate-display">1 AUD = ${displayRate}</div><div class="exchange-rate-sub">AUD → KRW</div></div>`;
  if(liveRate){html+=`<div style="padding:10px 14px 4px">`;[10,50,100,500].forEach(a=>{html+=`<div class="info-row" style="padding:8px 0;border-bottom:1px solid var(--gray-light)"><div class="info-row-icon">💵</div><div class="info-row-text"><div class="info-row-label">AUD ${a}</div><div class="info-row-value">₩ ${Math.round(liveRate*a).toLocaleString()}</div></div></div>`; });html+=`</div>`;}
  return html+'</div></div>';
}
function renderBudgetCard(rows){
  if(!rows.length)return'';
  const totalRow=rows.find(r=>r.label?.includes('합계')||r.label?.includes('총'));
  const itemRows=rows.filter(r=>r!==totalRow);
  function pa(v){if(!v)return 0;const m=v.replace(/,/g,'').match(/[\d.]+/);return m?parseFloat(m[0]):0;}
  const maxA=Math.max(...itemRows.map(r=>pa(r.value)),1);
  const cols=['#1A6B5A','#378ADD','#D85A30','#BA7517','#9B59B6','#5F5E5A'];
  let html=`<div class="info-section"><div class="info-card"><div class="info-card-header coral"><span class="ich-badge">💰</span>여행 예산</div><div class="budget-bar-wrap">`;
  if(totalRow)html+=`<div class="budget-total"><div class="budget-total-label">총 예산</div><div class="budget-total-value">${totalRow.value}</div></div>`;
  html+=`<div class="budget-items">`;
  itemRows.forEach((r,i)=>{const a=pa(r.value);const p=Math.round((a/maxA)*100);html+=`<div class="budget-item"><div class="budget-item-label">${r.icon||''} ${r.label||''}</div><div class="budget-item-bar-wrap"><div class="budget-item-bar" data-pct="${p}" style="background:${cols[i%cols.length]};width:0%"></div></div><div class="budget-item-val">${r.value}</div></div>`;});
  return html+'</div></div></div></div>';
}
function renderChecklistCard(rows){
  rows.forEach((_,i)=>{ const k=`chk_${i}`; if(!(k in checklistState))checklistState[k]=false; });
  const total=rows.length,done=rows.filter((_,i)=>checklistState[`chk_${i}`]).length;
  const pct=total>0?Math.round((done/total)*100):0;
  let html=`<div class="info-section"><div class="info-card"><div class="info-card-header gray"><span class="ich-badge">📋</span>준비물 체크리스트</div><div style="padding:10px 14px 4px"><div class="checklist-progress"><div class="checklist-progress-bar-wrap"><div class="checklist-progress-bar" style="width:${pct}%"></div></div><div class="checklist-progress-label">${done}/${total}</div></div>`;
  if(rows.length){html+=`<div class="checklist-grid">`;rows.forEach((r,i)=>{const ck=checklistState[`chk_${i}`];html+=`<div class="checklist-item${ck?' checked':''}" onclick="toggleCheck(${i})"><div class="checklist-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="checklist-icon">${r.icon||'📌'}</div><div class="checklist-label">${r.title||r.label||r.value||''}</div></div>`;});html+=`</div>`;}
  return html+'</div></div></div>';
}
function toggleCheck(idx){const k=`chk_${idx}`;checklistState[k]=!checklistState[k];localStorage.setItem('checklistState',JSON.stringify(checklistState));renderInfoContent(currentInfoCat);}

function selectInfoTab(btn){
  infoTabActive=true;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('main-filter-bar').style.display='none';
  document.getElementById('info-filter-bar').style.display='';
  document.getElementById('type-filter-bar').classList.add('hidden');
  closePlace();
  document.getElementById('timeline-panel').style.display='none';
  if(isMobile()){ document.getElementById('map-panel-el').style.display='none'; document.getElementById('map-toggle-btn').style.display='none'; }
  else document.getElementById('map-panel-el').style.display='none';
  document.getElementById('info-overlay').classList.add('show');
  selectInfoCat('flight',document.querySelector('#info-filter-bar .f-btn'));
}
function selectInfoCat(cat,btn){
  currentInfoCat=cat;
  document.querySelectorAll('#info-filter-bar .f-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderInfoContent(cat);
}
function exitInfoTab(){
  infoTabActive=false;
  document.getElementById('main-filter-bar').style.display='';
  document.getElementById('info-filter-bar').style.display='none';
  document.getElementById('info-overlay').classList.remove('show');
  document.getElementById('timeline-panel').style.display='';
  if(currentCat==='schedule')document.getElementById('type-filter-bar').classList.remove('hidden');
  if(isMobile()){ document.getElementById('map-panel-el').style.display=''; document.getElementById('map-toggle-btn').style.display=''; applyTimelineOffset(); setTimeout(()=>{if(map)map.invalidateSize();},50); }
  else{ document.getElementById('map-panel-el').style.display=''; setTimeout(()=>{if(map)map.invalidateSize();},50); }
}

/* ═══════════════════════════════════════════════
   MAP
═══════════════════════════════════════════════ */
const dayColors={0:'#E74C3C',1:'#1A6B5A',2:'#D85A30',3:'#378ADD',4:'#9B59B6',5:'#BA7517',6:'#16A085',7:'#34495E',8:'#7F8C8D'};
const dayViews={'all':{center:[-33.85,151.21],zoom:11},0:{center:[37.46,126.44],zoom:13},1:{center:[-33.86,151.21],zoom:14},2:{center:[-33.906,151.268],zoom:13},3:{center:[-33.82,151.26],zoom:13},4:{center:[-33.735,150.311],zoom:13},5:{center:[-33.855,151.24],zoom:13},6:{center:[-33.873,151.199],zoom:13},7:{center:[-33.873,151.208],zoom:13},8:{center:[-33.94,151.175],zoom:13}};
let map,scheduleMarkers=[],foodMarkers=[],activeMarker=null;
let currentDay='all', currentCat='schedule', currentTypeFilter='all';

function initMap(){
  if(map){map.remove();map=null;}
  map=L.map('leaflet-map',{zoomControl:true}).setView([-33.85,151.21],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB © OSM',maxZoom:19}).addTo(map);
  renderScheduleMarkers('all');
}
function makeIcon(color,size=16,day=null){
  const label=day!==null?`<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:${size*.55}px;color:#fff;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.35)">${day}</span>`:'';
  return L.divIcon({className:'',html:`<div style="position:relative;width:${size}px;height:${size}px;background:${color};border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.28)">${label}</div>`,iconSize:[size,size],iconAnchor:[size/2,size/2]});
}
function makePinIcon(color){return L.divIcon({className:'',html:`<div style="width:34px;height:34px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3)"></div>`,iconSize:[34,34],iconAnchor:[17,34]});}
function makeFoodIcon(emoji){return L.divIcon({className:'',html:`<div style="width:32px;height:32px;background:#D85A30;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:15px">${emoji}</div>`,iconSize:[32,32],iconAnchor:[16,16]});}
function renderScheduleMarkers(dayFilter){
  scheduleMarkers.forEach(m=>map.removeLayer(m));scheduleMarkers=[];
  DATA.schedule.filter(r=>r.lat&&r.lng&&r.type!=='transit').filter(r=>dayFilter==='all'||Number(r.day)==dayFilter).forEach(r=>{
    const m=L.marker([parseFloat(r.lat),parseFloat(r.lng)],{icon:makeIcon(dayColors[r.day]||'#1A6B5A',26,r.day)}).addTo(map).bindTooltip(`[Day ${r.day}] ${r.name}`,{direction:'top',offset:[0,-10]});
    m.on('click',()=>showInfo(r.name,r.addr||''));scheduleMarkers.push(m);
  });
}
function renderFoodMarkers(dayFilter){
  foodMarkers.forEach(m=>map.removeLayer(m));foodMarkers=[];
  DATA.food.filter(r=>r.lat&&r.lng).filter(r=>dayFilter==='all'||Number(r.day)==dayFilter).forEach(r=>{
    const m=L.marker([parseFloat(r.lat),parseFloat(r.lng)],{icon:makeFoodIcon(r.emoji||'🍽️')}).addTo(map).bindTooltip('🍴 '+r.name,{direction:'top',offset:[0,-14]});
    m.on('click',()=>showInfo(r.name,r.addr||''));foodMarkers.push(m);
  });
}
function clearAllMarkers(){scheduleMarkers.forEach(m=>map.removeLayer(m));scheduleMarkers=[];foodMarkers.forEach(m=>map.removeLayer(m));foodMarkers=[];}

/* ═══════════════════════════════════════════════
   UI NAV
═══════════════════════════════════════════════ */
function selectDay(day,btn){
  if(infoTabActive)exitInfoTab();
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('info-day-btn').classList.remove('active');
  btn.classList.add('active'); currentDay=day; closePlace();
  const v=dayViews[day]||dayViews['all'];
  if(map)map.flyTo(v.center,v.zoom,{duration:1.0});
  if(currentCat==='food')renderFoodMarkers(day); else renderScheduleMarkers(day);
  updateView();
}
function selectCat(cat,btn){
  document.querySelectorAll('#main-filter-bar .f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const prev=currentCat; currentCat=cat; closePlace();
  if(prev==='favorites'&&cat!=='favorites') renderAll();
  document.getElementById('type-filter-bar').classList.toggle('hidden', cat!=='schedule');
  if(cat==='food'){ clearAllMarkers();renderFoodMarkers(currentDay); if(foodMarkers.length){const g=L.featureGroup(foodMarkers);map.fitBounds(g.getBounds().pad(.25),{duration:.8});} }
  else if(cat==='favorites'){ clearAllMarkers(); const favIds=Object.keys(favState).filter(k=>favState[k]); DATA.schedule.filter(r=>favIds.includes(scheduleCardId(r))&&r.lat&&r.lng).forEach(r=>{const m=L.marker([parseFloat(r.lat),parseFloat(r.lng)],{icon:makeIcon('#D85A30',26,r.day)}).addTo(map);m.on('click',()=>showInfo(r.name,r.addr||''));scheduleMarkers.push(m);}); }
  else if(cat==='expenses'){ clearAllMarkers(); }
  else{ clearAllMarkers();renderScheduleMarkers(currentDay); }
  updateView();
}
function selectTypeFilter(type,btn){
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active'); currentTypeFilter=type; applyTypeFilter();
}
function applyTypeFilter(){
  document.querySelectorAll('.stop-item[data-type]').forEach(item=>{
    item.classList.toggle('type-hidden', currentTypeFilter!=='all'&&item.getAttribute('data-type')!==currentTypeFilter);
  });
}
function updateView(){
  if(currentCat==='favorites'){ document.getElementById('timeline-content').innerHTML=renderFavoritesView(); return; }
  if(currentCat==='expenses'){ document.getElementById('timeline-content').innerHTML=renderExpensesView(); return; }
  document.querySelectorAll('.day-section').forEach(ds=>{
    const dayId=ds.getAttribute('data-day');
    const show=(currentDay==='all'||currentDay==dayId);
    ds.classList.toggle('visible',show);
    if(show) ds.querySelectorAll('.cat-section').forEach(cs=>cs.classList.toggle('visible',cs.getAttribute('data-cat')===currentCat));
  });
  if(currentCat==='schedule')applyTypeFilter();
}

/* ── map pin / info ── */
function showInfo(name,addr){
  document.getElementById('place-name').textContent=name;
  document.getElementById('place-addr').textContent=addr;
  document.getElementById('place-info').classList.add('show');
  const b=document.getElementById('gmaps-btn');
  b.href=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+' '+addr)}`;
  b.classList.add('show');
}
function closePlace(){
  document.getElementById('place-info').classList.remove('show');
  document.getElementById('gmaps-btn').classList.remove('show');
  document.querySelectorAll('.stop-card,.food-card').forEach(c=>c.classList.remove('selected'));
  if(activeMarker&&map){map.removeLayer(activeMarker);activeMarker=null;}
}
function _pinMapCore(name,coords,addr,el){
  if(el)el.classList.add('selected');
  if(map){ map.flyTo([coords.lat,coords.lng],16,{duration:.85}); if(activeMarker)map.removeLayer(activeMarker); const col=dayColors[currentDay]||'#1A6B5A'; activeMarker=L.marker([coords.lat,coords.lng],{icon:makePinIcon(col),zIndexOffset:1000}).addTo(map).bindTooltip(name,{permanent:false,direction:'top',offset:[0,-38]}); }
  showInfo(name,addr);
}
function pinMap(name,coords,addr,el){
  if(isMobile()&&!mapExpanded){ mapExpanded=true; document.getElementById('map-panel-el').classList.remove('map-collapsed'); updateToggleUI(); applyTimelineOffset(); setTimeout(()=>{if(map)map.invalidateSize();_pinMapCore(name,coords,addr,el);},300); return; }
  _pinMapCore(name,coords,addr,el);
}

/* ═══════════════════════════════════════════════
   MOBILE
═══════════════════════════════════════════════ */
const PX={sidebar:44,topbar:44,filter:38,typeFilter:34,map:200,toggle:32};
const TOP={map:PX.sidebar+PX.topbar+PX.filter+PX.typeFilter,toggle:PX.sidebar+PX.topbar+PX.filter+PX.typeFilter+PX.map,timeline:PX.sidebar+PX.topbar+PX.filter+PX.typeFilter+PX.map+PX.toggle,toggleCollapsed:PX.sidebar+PX.topbar+PX.filter+PX.typeFilter,timelineCollapsed:PX.sidebar+PX.topbar+PX.filter+PX.typeFilter+PX.toggle};
let mapExpanded=true;
function isMobile(){ return window.innerWidth<=768; }
function applyTimelineOffset(){
  if(!isMobile())return;
  const tl=document.getElementById('timeline-panel'),btn=document.getElementById('map-toggle-btn');
  if(tl)tl.style.top=(mapExpanded?TOP.timeline:TOP.timelineCollapsed)+'px';
  if(btn)btn.style.top=(mapExpanded?TOP.toggle:TOP.toggleCollapsed)+'px';
}
function updateToggleUI(){
  const btn=document.getElementById('map-toggle-btn'),pill=document.getElementById('map-toggle-pill');
  if(!btn)return; btn.classList.toggle('collapsed',!mapExpanded);
  if(pill)pill.textContent=mapExpanded?'접기':'지도 보기';
}
function toggleMap(){
  mapExpanded=!mapExpanded;
  const p=document.getElementById('map-panel-el');
  if(mapExpanded){p.classList.remove('map-collapsed');setTimeout(()=>{if(map)map.invalidateSize();},290);}
  else p.classList.add('map-collapsed');
  updateToggleUI(); applyTimelineOffset();
}
function initMobile(){
  setTimeout(()=>{if(map)map.invalidateSize();},50);
  if(isMobile()){applyTimelineOffset();updateToggleUI();}
  else{document.getElementById('timeline-panel').style.top='';document.getElementById('map-toggle-btn').style.top='';}
}
window.addEventListener('resize',initMobile);
</script>
